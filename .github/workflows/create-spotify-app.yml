name: Create Spotify App for Pod

on:
  workflow_dispatch:
    inputs:
      podId:
        description: "Pod ID (generated by Sonaara)"
        required: true
        type: string
      podName:
        description: "Pod display name (used as Spotify app name prefix)"
        required: true
        type: string
      email:
        description: "Spotify account email"
        required: true
        type: string
      password:
        description: "Spotify account password"
        required: true
        type: string
      webhookUrl:
        description: "Base URL to POST results back to (default: production)"
        required: false
        type: string
        default: "https://sonaara.vercel.app"

jobs:
  create-app:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run Spotify app creation script
        run: node scripts/playwright/create-spotify-app.js
        env:
          POD_ID: ${{ inputs.podId }}
          POD_NAME: ${{ inputs.podName }}
          EMAIL: ${{ inputs.email }}
          PASSWORD: ${{ inputs.password }}
          WEBHOOK_URL: ${{ inputs.webhookUrl }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
